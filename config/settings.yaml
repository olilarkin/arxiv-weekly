# ============================================================
# System settings.
# ============================================================

# arXiv fetch settings
arxiv:
  lookback_days: 7          # How many days of recent papers to consider.
  max_papers: 50            # Maximum number of papers kept after filtering.
  request_interval: 3.0     # Delay between API requests, in seconds (arXiv asks ≥3s).
  user_agent: "arxiv-weekly/1.0 (+https://github.com/olilarkin/arxiv-weekly)"

# GitHub Models settings
github_models:
  endpoint: "https://models.inference.ai.azure.com"
  model: "gpt-4o"
  max_tokens: 1500
  batch_size: 5
  batch_max_tokens: 6000
  min_request_interval: 60.0
  retry_max: 3
  retry_interval: 5.0       # Retry interval, in seconds.

# Data output paths
data:
  weekly_dir: "data/weekly"
  index_file: "data/index.json"
  latest_file: "data/latest.json"
