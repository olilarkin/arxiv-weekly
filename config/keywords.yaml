# ============================================================
# arXiv paper filtering configuration.
# Edit this file alone to add or remove keywords.
# ============================================================

# Target arXiv categories
categories:
  - cs.SD
  - eess.AS

# Filter keywords (OR semantics).
# Papers whose title or abstract contains any keyword are included.
include:
  # Audio foundation models
  - audio foundation model
  - audio language model
  - audio large language model
  - sound foundation model
  - music foundation model
  - audio pre-training
  - audio self-supervised
  - universal audio
  # Source separation
  - source separation
  - music separation
  - speech separation
  - sound separation
  - speaker separation
  - vocal separation
  - music demixing
  # Anomalous sound detection
  - anomalous sound detection
  - anomaly sound detection
  - anomaly detection
  - acoustic anomaly
  - machine sound anomaly
  - unsupervised anomaly
  - sound event detection
  # Music transcription / beat tracking
  - automatic music transcription
  - music transcription
  - audio to midi
  - audio-to-midi
  - piano transcription
  - drum transcription
  - guitar transcription
  - vocal transcription
  - singing transcription
  - multi-pitch estimation
  - multipitch estimation
  - beat tracking
  - beat detection
  - downbeat tracking
  - tempo estimation
  - onset detection
  - chord recognition
  - chord estimation

# Exclude keywords (papers matching these are dropped even if include matches).
exclude:
  - survey only
  - retracted

# UI category definitions
ui_categories:
  - id: foundation
    label: Audio Foundation Models
    color: "#38bdf8"
    keywords:
      - audio foundation model
      - audio language model
      - audio large language model
      - sound foundation model
      - music foundation model
      - audio pre-training
      - audio self-supervised
      - universal audio

  - id: separation
    label: Source Separation
    color: "#4ade80"
    keywords:
      - source separation
      - music separation
      - speech separation
      - sound separation
      - speaker separation
      - vocal separation
      - music demixing

  - id: anomaly
    label: Anomalous Sound Detection
    color: "#fb923c"
    keywords:
      - anomalous sound detection
      - anomaly sound detection
      - anomaly detection
      - acoustic anomaly
      - machine sound anomaly
      - unsupervised anomaly
      - sound event detection

  - id: transcription
    label: Music Transcription & Beat Tracking
    color: "#f472b6"
    keywords:
      - automatic music transcription
      - music transcription
      - audio to midi
      - audio-to-midi
      - piano transcription
      - drum transcription
      - guitar transcription
      - vocal transcription
      - singing transcription
      - multi-pitch estimation
      - multipitch estimation
      - beat tracking
      - beat detection
      - downbeat tracking
      - tempo estimation
      - onset detection
      - chord recognition
      - chord estimation
