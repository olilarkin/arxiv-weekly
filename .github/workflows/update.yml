name: Weekly arXiv Update

# Scheduled trigger is disabled during the English rework.
# Re-enable by uncommenting the schedule block below.
on:
  # schedule:
  #   # Every Friday at 12:00 UTC
  #   - cron: '0 12 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch only, no commit)'
        required: false
        default: 'false'
      target_date:
        description: 'Base date YYYY-MM-DD (defaults to today). Used to generate data for past weeks.'
        required: false
        default: ''

permissions:
  contents: write
  models: read

jobs:
  # ─── Step 1: Fetch papers from arXiv ──────────────────────────────────────
  fetch:
    runs-on: ubuntu-latest
    outputs:
      paper_count: ${{ steps.fetch.outputs.paper_count }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch papers from arXiv
        id: fetch
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          python scripts/fetch_papers.py $DATE_ARG
          COUNT=$(python -c "import json; print(len(json.load(open('data/raw_papers.json'))))")
          echo "paper_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Fetched $COUNT papers"

      - name: Upload raw papers
        uses: actions/upload-artifact@v4
        with:
          name: raw-papers
          path: data/raw_papers.json
          retention-days: 1

  # ─── Step 2: Analyze with GPT-4o ──────────────────────────────────────────
  analyze:
    needs: fetch
    runs-on: ubuntu-latest
    if: needs.fetch.outputs.paper_count > 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download raw papers
        uses: actions/download-artifact@v4
        with:
          name: raw-papers
          path: data/

      - name: Analyze papers with GitHub Models (GPT-4o)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/analyze_papers.py

      - name: Upload analyzed papers
        uses: actions/upload-artifact@v4
        with:
          name: analyzed-papers
          path: data/analyzed_papers.json
          retention-days: 1

  # ─── Step 3: Build data ───────────────────────────────────────────────────
  build:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download analyzed papers
        uses: actions/download-artifact@v4
        with:
          name: analyzed-papers
          path: data/

      - name: Build weekly JSON and update index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          python scripts/build_data.py $DATE_ARG

      - name: Upload built data
        uses: actions/upload-artifact@v4
        with:
          name: built-data
          path: data/
          retention-days: 1

  # ─── Step 4: Build frontend and deploy to GitHub Pages ────────────────────
  deploy:
    needs: build
    if: github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Download built data
        uses: actions/download-artifact@v4
        with:
          name: built-data
          path: data/

      - name: Fetch existing weekly data from gh-pages
        run: |
          # First deploy: gh-pages branch may not exist yet — tolerate that.
          git fetch origin gh-pages 2>/dev/null || echo "[deploy] gh-pages branch not present yet — first deploy"
          mkdir -p web/public/data/weekly
          # Copy existing weekly JSON files
          for f in $(git ls-tree -r --name-only origin/gh-pages 2>/dev/null | grep '^data/weekly/.*\.json$'); do
            git show origin/gh-pages:$f > web/public/$f 2>/dev/null || true
          done
          # Save existing index.json
          git show origin/gh-pages:data/index.json > /tmp/existing_index.json 2>/dev/null \
            || echo '{"weeks":[],"generated_at":""}' > /tmp/existing_index.json

      - name: Merge data and copy to web/public
        run: |
          # Overwrite weekly JSONs with newly built ones
          find data/weekly -name '*.json' -exec cp {} web/public/data/weekly/ \;
          # Merge index.json (existing + new)
          python3 - << 'EOF'
          import json
          existing = json.load(open('/tmp/existing_index.json'))
          new = json.load(open('data/index.json'))
          merged = {w['date']: w for w in existing.get('weeks', [])}
          for w in new.get('weeks', []):
              merged[w['date']] = w
          existing['weeks'] = sorted(merged.values(), key=lambda x: x['date'], reverse=True)
          existing['generated_at'] = new.get('generated_at', '')
          json.dump(existing, open('web/public/data/index.json', 'w'), ensure_ascii=False, indent=2)
          print(f"[deploy] Merged index: {len(existing['weeks'])} weeks")
          EOF
          cp data/latest.json web/public/data/

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          publish_branch: gh-pages
          commit_message: "deploy: weekly update"
