name: Reanalyze Weekly Data

on:
  workflow_dispatch:
    inputs:
      only_failed:
        description: 'Only re-analyze papers with the "Analysis failed." marker'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  models: read

jobs:
  reanalyze:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pages: write
      id-token: write
      models: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch existing weekly data from gh-pages
        run: |
          git fetch origin gh-pages 2>/dev/null || { echo "gh-pages not present — nothing to reanalyze"; exit 1; }
          mkdir -p data/weekly
          for f in $(git ls-tree -r --name-only origin/gh-pages 2>/dev/null | grep '^data/weekly/.*\.json$'); do
            git show origin/gh-pages:$f > $f 2>/dev/null || true
          done
          git show origin/gh-pages:data/index.json > data/index.json 2>/dev/null || true
          git show origin/gh-pages:data/latest.json > data/latest.json 2>/dev/null || true
          echo "Weekly files:"
          ls data/weekly/

      - name: Reanalyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.only_failed }}" = "true" ]; then
            FLAGS="--only-failed"
          fi
          python scripts/reanalyze_data.py $FLAGS

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Copy data to web/public
        run: |
          mkdir -p web/public/data/weekly
          find data/weekly -name '*.json' -exec cp {} web/public/data/weekly/ \;
          [ -f data/index.json ] && cp data/index.json web/public/data/
          [ -f data/latest.json ] && cp data/latest.json web/public/data/

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          publish_branch: gh-pages
          commit_message: "deploy: reanalyze (only_failed=${{ github.event.inputs.only_failed }})"
